<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ART for BEING</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000;
    font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
  }

  /* ===== スクロールコンテナ ===== */
  #slider {
    width: 100%;
    height: 100vh;
    overflow-y: scroll;
    scroll-snap-type: y mandatory;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  #slider::-webkit-scrollbar { display: none; }

  /* ===== 各スライド ===== */
  .slide {
    width: 100%;
    height: 100vh;
    scroll-snap-align: start;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .slide img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center top;
    display: block;
  }

  /* ===== ページインジケーター ===== */
  #indicator {
    position: fixed;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    gap: 8px;
    z-index: 100;
  }

  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: rgba(255,255,255,0.4);
    transition: all 0.3s ease;
    cursor: pointer;
  }

  .dot.active {
    background: #fff;
    transform: scale(1.4);
  }

  /* ===== スワイプヒント（初回のみ） ===== */
  #swipe-hint {
    position: fixed;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.8);
    font-size: 11px;
    letter-spacing: 0.1em;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    animation: fadeHint 3s ease forwards;
    z-index: 99;
    pointer-events: none;
  }

  .hint-arrow {
    width: 18px;
    height: 28px;
    border: 2px solid rgba(255,255,255,0.7);
    border-radius: 10px;
    position: relative;
  }

  .hint-arrow::after {
    content: '';
    width: 4px;
    height: 8px;
    background: rgba(255,255,255,0.8);
    border-radius: 2px;
    position: absolute;
    top: 4px;
    left: 50%;
    transform: translateX(-50%);
    animation: scrollDown 1.5s ease infinite;
  }

  @keyframes scrollDown {
    0% { top: 4px; opacity: 1; }
    100% { top: 14px; opacity: 0; }
  }

  @keyframes fadeHint {
    0%, 60% { opacity: 1; }
    100% { opacity: 0; pointer-events: none; }
  }

  /* ===== LINE固定ボタン ===== */
  #line-btn {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 200;
    display: flex;
    justify-content: center;
    padding: 12px 20px 20px;
    background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, transparent 100%);
  }

  #line-btn a {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    background: #06C755;
    color: #fff;
    text-decoration: none;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.05em;
    padding: 14px 32px;
    border-radius: 50px;
    box-shadow: 0 4px 20px rgba(6,199,85,0.45);
    width: 100%;
    max-width: 360px;
    transition: transform 0.15s, box-shadow 0.15s;
  }

  #line-btn a:active {
    transform: scale(0.97);
    box-shadow: 0 2px 10px rgba(6,199,85,0.3);
  }

  .line-icon {
    width: 22px;
    height: 22px;
    flex-shrink: 0;
  }
</style>
</head>

<script>
  const slider = document.getElementById('slider');
  const dots = document.querySelectorAll('.dot');
  const slides = document.querySelectorAll('.slide');
  let current = 0;

  // IntersectionObserver でアクティブスライドを追跡
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting && entry.intersectionRatio >= 0.5) {
        const idx = parseInt(entry.target.dataset.index);
        if (idx !== current) {
          dots[current].classList.remove('active');
          current = idx;
          dots[current].classList.add('active');
        }
      }
    });
  }, { threshold: 0.5 });

  slides.forEach(s => observer.observe(s));

  // ドットクリックでスクロール
  dots.forEach((dot, i) => {
    dot.addEventListener('click', () => {
      slides[i].scrollIntoView({ behavior: 'smooth' });
    });
  });

  // スワイプヒント：最初のスクロール後に非表示
  slider.addEventListener('scroll', () => {
    document.getElementById('swipe-hint').style.display = 'none';
  }, { once: true });
</script>
</body>
